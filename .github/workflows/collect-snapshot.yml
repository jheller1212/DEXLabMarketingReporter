name: Collect LinkedIn Snapshot
on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 08:00 CET (UTC+1)
  workflow_dispatch:
jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python src/collect_snapshot.py
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
      - name: Commit snapshot
        run: |
          git config user.name "Jonas Heller"
          git config user.email "jonasheller89@gmail.com"
          git add data/
          git diff --cached --quiet || git commit -m "Weekly LinkedIn snapshot $(date +%Y-%m-%d)"
          git push
