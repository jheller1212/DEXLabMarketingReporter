name: Weekly ToDo Digest
on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 09:00 CET (UTC+1)
  workflow_dispatch:
jobs:
  post-todo-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python src/planner.py
        env:
          MS_GRAPH_TOKEN: ${{ secrets.MS_GRAPH_TOKEN }}
          MS_GRAPH_REFRESH_TOKEN: ${{ secrets.MS_GRAPH_REFRESH_TOKEN }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          PLANNER_PLAN_ID: ${{ secrets.PLANNER_PLAN_ID }}
          TEAMS_CHAT_ID: ${{ secrets.TEAMS_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
